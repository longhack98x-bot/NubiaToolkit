plugins {
    id 'com.android.application'
}

android {
    namespace "com.khanhnguyen9872.nubiatoolkit"
    compileSdk 33

    defaultConfig {
        applicationId "com.khanhnguyen9872.nubiatoolkit"
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file("../release-key.jks")
            storePassword "nubiatoolkit"
            keyAlias "nubia"
            keyPassword "nubiatoolkit"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    compileOnly files('libs/api-82.jar')
    compileOnly files('libs/api-82-sources.jar') // chỉ nếu bạn muốn code completion
    // compileOnly 'de.robv.android.xposed:api:82'
}
